name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - add-workflow
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Copy Audio files
        run: ./gradlew copyAudio
      - name: Build with Gradle
        run: ./gradlew build
